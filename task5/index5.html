<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Courses Portal</title>
    <link rel="stylesheet" href="style5.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">CollegeHub</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>Explore Our College Courses</h1>
        <p>Find the perfect program to advance your career with expert-led classes.</p>
    </section>

    <section id="courses" class="courses-section">
        <div class="container">
            <h2>Available Courses</h2>
            <div class="filters">
                <input type="text" id="search" placeholder="Search courses...">
                <select id="category">
                    <option value="">All Categories</option>
                    <option value="engineering">Engineering</option>
                    <option value="business">Business</option>
                    <option value="arts">Arts</option>
                </select>
            </div>
            <div id="course-grid" class="course-grid">
                <!-- Courses populated by JS -->
            </div>
        </div>
    </section>

    <footer id="contact">
        <p>&copy; 2026 CollegeHub. All rights reserved.</p>
    </footer>

    <script src="script5.js"></script>
</body>
</html>

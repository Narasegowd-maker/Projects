<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Year Calendar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f5f5f5;
    }
    .year {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }
    .month {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 10px;
    }
    .month h3 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 1.1rem;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      font-size: 0.8rem;
      font-weight: bold;
      color: #555;
      padding-bottom: 5px;
      border-bottom: 1px solid #eee;
    }
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-gap: 3px;
      margin-top: 8px;
    }
    .day {
      text-align: center;
      padding: 5px 0;
      font-size: 0.9rem;
      border-radius: 4px;
    }
    .day.empty {
      background: transparent;
    }
    .day.today {
      background: #2196f3;
      color: white;
    }
  </style>
</head>
<body>
  <h1>2026 Calendar</h1>
  <div id="year-calendar"></div>

  <script>
    const monthNames = [
      "January", "February", "March", "April",
      "May", "June", "July", "August",
      "September", "October", "November", "December"
    ];

    function renderYear(year) {
      const root = document.getElementById("year-calendar");
      root.innerHTML = "";

      for (let month = 0; month < 12; month++) {
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const firstDayOfWeek = firstDay.getDay(); // 0=Sun, 6=Sat
        const daysInMonth = lastDay.getDate();

        const today = new Date();
        const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

        const monthDiv = document.createElement("div");
        monthDiv.className = "month";

        const header = document.createElement("h3");
        header.textContent = `${monthNames[month]} ${year}`;
        monthDiv.appendChild(header);

        const weekdays = document.createElement("div");
        weekdays.className = "weekdays";
        for (const dayName of ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]) {
          const d = document.createElement("div");
          d.textContent = dayName;
          weekdays.appendChild(d);
        }
        monthDiv.appendChild(weekdays);

        const daysGrid = document.createElement("div");
        daysGrid.className = "days";

        // Empty cells before first day
        for (let i = 0; i < firstDayOfWeek; i++) {
          const empty = document.createElement("div");
          empty.className = "day empty";
          daysGrid.appendChild(empty);
        }

        // Cells for each day
        for (let day = 1; day <= daysInMonth; day++) {
          const cell = document.createElement("div");
          cell.className = "day";
          cell.textContent = day;

          if (isCurrentMonth && today.getDate() === day) {
            cell.classList.add("today");
          }

          daysGrid.appendChild(cell);
        }

        monthDiv.appendChild(daysGrid);
        root.appendChild(monthDiv);
      }
    }

    // Render this year (2026)
    renderYear(2026);
  </script>
</body>
</html>
